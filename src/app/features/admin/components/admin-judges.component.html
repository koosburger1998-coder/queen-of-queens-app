<div class="admin-section" *ngIf="admin$ | async as admin">
  <div class="admin-section__head">
    <h2>Judges</h2>
    <button mat-raised-button color="primary" (click)="startCreate()" *ngIf="!creating">
      <mat-icon>add</mat-icon> Add Judge
    </button>
  </div>

  <div class="qq-card" *ngIf="creating">
    <h3>New Judge</h3>
    <div class="form-grid">
      <div class="form-field"><label class="qq-label">Name</label><input class="qq-input" [(ngModel)]="draft.name" placeholder="Judge's name"></div>
      <div class="form-field"><label class="qq-label">Access Code</label><input class="qq-input" [(ngModel)]="draft.code" placeholder="Unique login code"></div>
    </div>
    <div class="form-actions">
      <button mat-raised-button color="primary" (click)="save()">Create</button>
      <button mat-button (click)="cancelEdit()">Cancel</button>
    </div>
  </div>

  <div class="qq-card judge-table" *ngIf="admin.judges?.length">
    <div *ngFor="let j of admin.judges; trackBy: trackById" class="judge-row">
      <ng-container *ngIf="editingId !== j.id">
        <div class="judge-row__info">
          <span class="judge-row__name">{{ j.name }}</span>
          <span class="judge-row__code" [class.revealed]="showCodes[j.id]">
            {{ showCodes[j.id] ? j.code : '••••••' }}
          </span>
        </div>
        <div class="judge-row__actions">
          <button mat-icon-button title="Show/hide code" (click)="toggleCode(j.id)">
            <mat-icon>{{ showCodes[j.id] ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          <button mat-icon-button (click)="startEdit(j)"><mat-icon>edit</mat-icon></button>
          <button mat-icon-button color="warn" (click)="del(j.id)"><mat-icon>delete</mat-icon></button>
        </div>
      </ng-container>
      <div class="judge-row__edit" *ngIf="editingId === j.id">
        <div class="form-grid">
          <div class="form-field"><label class="qq-label">Name</label><input class="qq-input" [(ngModel)]="draft.name"></div>
          <div class="form-field"><label class="qq-label">Code</label><input class="qq-input" [(ngModel)]="draft.code"></div>
        </div>
        <div class="form-actions">
          <button mat-raised-button color="primary" (click)="save()">Save</button>
          <button mat-button (click)="cancelEdit()">Cancel</button>
        </div>
      </div>
    </div>
  </div>
  <p class="qq-muted" *ngIf="!admin.judges?.length">No judges yet.</p>
</div>
