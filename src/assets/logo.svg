<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="100%" style="stop-color:#0f0a1e"/>
    </linearGradient>
    <linearGradient id="crown" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff1f8f"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="gems" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd166"/>
      <stop offset="100%" style="stop-color:#ffb347"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="url(#bg)" stroke="url(#crown)" stroke-width="3"/>
  <!-- Crown body -->
  <polygon points="30,130 50,70 80,105 100,55 120,105 150,70 170,130" fill="url(#crown)" opacity="0.95"/>
  <!-- Crown base bar -->
  <rect x="30" y="128" width="140" height="20" rx="6" fill="url(#crown)" opacity="0.95"/>
  <!-- Gem dots on points -->
  <circle cx="50" cy="68" r="7" fill="url(#gems)"/>
  <circle cx="100" cy="53" r="8" fill="url(#gems)"/>
  <circle cx="150" cy="68" r="7" fill="url(#gems)"/>
  <!-- Stars -->
  <circle cx="62" cy="163" r="3" fill="#ffd166" opacity="0.8"/>
  <circle cx="100" cy="163" r="3" fill="#ffd166" opacity="0.8"/>
  <circle cx="138" cy="163" r="3" fill="#ffd166" opacity="0.8"/>
  <!-- Q letter -->
  <text x="100" y="120" text-anchor="middle" font-family="Georgia, serif" font-size="36" font-weight="bold" fill="white" opacity="0.15">Q</text>
</svg>
